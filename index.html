<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🌤️ Weather App</h1>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city">
    <button onclick="getWeather()">Search</button>
  </div>

  <div class="weather-card">
    <h2 id="city">City</h2>
    <h1 id="temp">--°C</h1>
  </div>

  <div class="grid">
    <div class="box">Feels Like <p id="feels">--</p></div>
    <div class="box">Humidity <p id="humidity">--</p></div>
    <div class="box">Wind <p id="wind">--</p></div>
    <div class="box">Cloud <p id="cloud">--</p></div>
    <div class="box">Sunrise <p id="sunrise">--</p></div>
    <div class="box">Sunset <p id="sunset">--</p></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
